# weekly.yml -- GitHub Actions workflow for weekly grant collection + Opus deep search.
#
# This is the SOLE scheduled workflow. Daily cron is disabled.
#
# Runs every Sunday at 08:00 UTC. Executes the weekly pipeline:
#   1. Checks out the repo (with push-capable token).
#   2. Sets up Python and installs dependencies.
#   3. Runs backend/main.py --mode weekly, which performs the full pipeline
#      PLUS Claude Opus deep web search, re-evaluation of recent grants,
#      strategic notes generation, and sends the weekly digest email.
#   4. Commits updated data/ JSON files (grants.json, strategic_notes.json,
#      run_status.json, last_run_summary.json) back to the repo.
#
# Required repository secrets:
#   - ANTHROPIC_API_KEY   (Claude API key)
#   - EMAIL_ADDRESS        (sender Gmail address)
#   - EMAIL_PASSWORD       (Gmail app password -- NOT your Google password)
#
# NOTE: You may need to enable push permissions for workflows:
#   Settings > Actions > General > Workflow permissions > "Read and write permissions"
#   Without this, the git push step will fail with a 403 error.

name: Weekly Deep Search

on:
  schedule:
    - cron: "0 8 * * 0"   # Every Sunday at 08:00 UTC
  workflow_dispatch:        # Allow manual trigger from Actions tab

permissions:
  contents: write           # Required for git push back to repo

jobs:
  weekly-run:
    runs-on: ubuntu-latest
    timeout-minutes: 60     # Opus web search + re-eval can take a while

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # The default GITHUB_TOKEN is used. With `permissions: contents: write`
          # above, this token can push commits back to the repo.
          token: ${{ github.token }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run weekly deep search
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: python backend/main.py --mode weekly

      - name: Commit updated data
        run: |
          git config user.name "Grant Radar Bot"
          git config user.email "grant-radar[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "chore: weekly deep search $(date -u +%Y-%m-%d)"
          git push
